services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: devautomation-api:local
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DEVAUTOMATION_Telemetry__ServiceName: DevAutomation.Api
      DEVAUTOMATION_Telemetry__Enabled: ${DEVAUTOMATION_Telemetry__Enabled:-false}
      DEVAUTOMATION_Telemetry__OtlpEndpoint: ${DEVAUTOMATION_Telemetry__OtlpEndpoint:-http://otel-collector:4317}
      DEVAUTOMATION_Telemetry__OtlpHeaders: ${DEVAUTOMATION_Telemetry__OtlpHeaders:-}
      DEVAUTOMATION_Database__ApplyMigrations: "false"
      DEVAUTOMATION_ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=devautomation;Username=devautomation;Password=devautomation
      DEVAUTOMATION_Queue__KafkaBootstrapServers: kafka:9092
      DEVAUTOMATION_Agent__ClaudeImage: devautomation-claude:latest
      DEVAUTOMATION_Agent__DockerNetwork: devautomation-network
      DEVAUTOMATION_Agent__ApprovalMcpCommand: dotnet /app/DevAutomation.ApprovalMcp.dll
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - devautomation

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: devautomation-api:local
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DEVAUTOMATION_Database__RunMigrationsOnly: "true"
      DEVAUTOMATION_ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=devautomation;Username=devautomation;Password=devautomation
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devautomation

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: devautomation-worker:local
    env_file:
      - .env
    environment:
      DOTNET_ENVIRONMENT: Development
      DEVAUTOMATION_Telemetry__ServiceName: DevAutomation.Worker
      DEVAUTOMATION_Telemetry__Enabled: ${DEVAUTOMATION_Telemetry__Enabled:-false}
      DEVAUTOMATION_Telemetry__OtlpEndpoint: ${DEVAUTOMATION_Telemetry__OtlpEndpoint:-http://otel-collector:4317}
      DEVAUTOMATION_Telemetry__OtlpHeaders: ${DEVAUTOMATION_Telemetry__OtlpHeaders:-}
      DEVAUTOMATION_Database__ApplyMigrations: "false"
      DEVAUTOMATION_ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=devautomation;Username=devautomation;Password=devautomation
      DEVAUTOMATION_Queue__KafkaBootstrapServers: kafka:9092
      DEVAUTOMATION_Queue__KafkaConsumerGroupId: devautomation-api
      DEVAUTOMATION_Agent__ClaudeImage: devautomation-claude:latest
      DEVAUTOMATION_Agent__DockerNetwork: devautomation-network
      DEVAUTOMATION_Agent__ApprovalMcpCommand: dotnet /app/DevAutomation.ApprovalMcp.dll
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    networks:
      - devautomation

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devautomation
      POSTGRES_USER: devautomation
      POSTGRES_PASSWORD: devautomation
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devautomation -d devautomation"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - devautomation

  kafka:
    image: redpandadata/redpanda:v24.1.1
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:9094
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092,OUTSIDE://localhost:9092
    ports:
      - "9092:9094"
    networks:
      - devautomation

  agent-image:
    build:
      context: .
      dockerfile: Dockerfile.agent
    image: devautomation-claude:latest
    profiles: ["build-only"]
    command: "echo agent image built"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    profiles: ["observability"]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      jaeger:
        condition: service_started
    networks:
      - devautomation

  jaeger:
    image: jaegertracing/all-in-one:1.57
    profiles: ["observability"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
    networks:
      - devautomation

  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - devautomation

volumes:
  postgres-data:

networks:
  devautomation:
    name: devautomation-network
