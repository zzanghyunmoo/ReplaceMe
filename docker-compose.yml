services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: devautomation-api:local
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DEVAUTOMATION_ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=devautomation;Username=devautomation;Password=devautomation
      DEVAUTOMATION_Queue__KafkaBootstrapServers: kafka:9092
      DEVAUTOMATION_Agent__ClaudeImage: devautomation-claude:latest
      DEVAUTOMATION_Agent__DockerNetwork: devautomation-network
      DEVAUTOMATION_Agent__ApprovalMcpCommand: dotnet /app/DevAutomation.ApprovalMcp.dll
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - devautomation

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devautomation
      POSTGRES_USER: devautomation
      POSTGRES_PASSWORD: devautomation
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devautomation -d devautomation"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - devautomation

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9094"
    networks:
      - devautomation

  agent-image:
    build:
      context: .
      dockerfile: Dockerfile.agent
    image: devautomation-claude:latest
    profiles: ["build-only"]
    command: "echo agent image built"

volumes:
  postgres-data:

networks:
  devautomation:
    name: devautomation-network
